name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main, staging]  # 👈 thêm staging
  workflow_dispatch:
concurrency:
  group: cloudflare-pages-${{ github.ref_name }}  # 👈 tách concurrency theo branch
  cancel-in-progress: false
jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build with Astro
        env:
          SITE_URL: ${{ github.ref_name == 'staging' && 'https://staging-blog.tvphus.dev' || vars.SITE_URL || 'https://blog.tvphus.dev' }}
          BASE_PATH: ''
          PUBLIC_GITHUB_HANDLE: ${{ vars.PUBLIC_GITHUB_HANDLE || 'miyukowo' }}
          PUBLIC_GITHUB_REPO: ${{ vars.PUBLIC_GITHUB_REPO || 'blog' }}
          PUBLIC_TWITTER_HANDLE: ${{ vars.PUBLIC_TWITTER_HANDLE }}
          PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
          PUBLIC_GISCUS_ENABLED: ${{ vars.PUBLIC_GISCUS_ENABLED }}
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}
          CI_SKIP_AUTO_OG_IMAGE: ${{ github.ref_name == 'staging' && 'true' || 'false' }}  # 👈 bỏ qua OG image trên staging cho build nhanh hơn
        run: bun run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'blog' }} --branch=${{ github.ref_name }}
