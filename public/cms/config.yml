# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: miyukowo/blog
  branch: main
  skip_ci: true

media_folder: /public/uploads
public_folder: /uploads

output:
  omit_empty_optional_fields: true

slug:
  encoding: ascii
  clean_accents: true

i18n:
  structure: multiple_folders
  locales: [en, vi]
  default_locale: en

collections:
  - name: posts
    label: Blog Posts
    label_singular: Post
    folder: /src/content/posts
    i18n: true
    create: true
    slug: "{{fields.slug}}"
    path: "{{fields.slug}}/index"
    extension: mdx
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true
        hint: "Tiêu đề bài viết, tối đa 140 ký tự."

      - label: Description
        name: description
        widget: text
        i18n: true
        hint: "Mô tả ngắn, tối đa 280 ký tự."

      - label: Slug
        name: slug
        widget: string
        required: true
        i18n: duplicate
        hint: "Dùng gạch nối, làm slug URL. Ví dụ: arch-linux-install"

      - label: Translation Key
        name: translationKey
        widget: string
        required: true
        i18n: duplicate
        hint: "Điền giống slug. Ví dụ: arch-linux-install"

      - label: Publish Date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        i18n: duplicate

      - label: Updated Date
        name: updatedDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        i18n: duplicate

      - label: Hero Image
        name: heroImage
        widget: image
        required: false
        i18n: duplicate

      - label: Hero Image Alt
        name: heroImageAlt
        widget: string
        required: false
        i18n: true

      - label: Tags
        name: tags
        widget: list
        required: false
        i18n: duplicate

      - label: Categories
        name: categories
        widget: list
        required: false
        i18n: true

      - label: Table of Contents
        name: toc
        widget: boolean
        default: true
        required: false
        i18n: duplicate
        hint: "Mặc định bật. Chỉ cần set khi muốn tắt."

      - label: Pinned
        name: pinned
        widget: boolean
        required: false
        i18n: duplicate
        hint: "Ghim bài lên đầu trang."

      - label: Draft
        name: draft
        widget: boolean
        required: false
        i18n: duplicate
        hint: "Bài sẽ không hiển thị khi bật."

      - label: Comments
        name: comments
        widget: boolean
        default: true
        required: false
        i18n: duplicate
        hint: "Mặc định bật. Chỉ cần set khi muốn tắt."

      - label: Math (KaTeX)
        name: math
        widget: boolean
        required: false
        i18n: duplicate
        hint: "Bật khi bài có công thức toán học."

      - label: Unlisted
        name: unlisted
        widget: boolean
        required: false
        i18n: duplicate
        hint: "Ẩn khỏi listing nhưng vẫn truy cập được qua link trực tiếp."

      - label: Body
        name: body
        widget: markdown
        i18n: true

  - name: pages
    label: Pages
    label_singular: Page
    folder: /src/content/pages
    i18n: true
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        i18n: true

      - label: Description
        name: description
        widget: text
        i18n: true

      - label: Publish Date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        i18n: duplicate

      - label: Updated Date
        name: updatedDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        i18n: duplicate

      - label: Hero Image
        name: heroImage
        widget: image
        required: false
        i18n: duplicate

      - label: Hero Image Alt
        name: heroImageAlt
        widget: string
        required: false
        i18n: true

      - label: Show in Nav
        name: showInNav
        widget: boolean
        required: false
        i18n: duplicate

      - label: Table of Contents
        name: toc
        widget: boolean
        required: false
        i18n: duplicate

      - label: Comments
        name: comments
        widget: boolean
        required: false
        i18n: duplicate

      - label: Unlisted
        name: unlisted
        widget: boolean
        required: false
        i18n: duplicate

      - label: Canonical URL
        name: canonicalURL
        widget: string
        required: false
        i18n: duplicate

      - label: Body
        name: body
        widget: markdown
        i18n: true