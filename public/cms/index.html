<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Sveltia CMS</title>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      CMS.registerEditorComponent({
        id: 'alert',
        label: 'Alert / Callout',
        fields: [
          {
            name: 'type',
            label: 'Type',
            widget: 'select',
            options: ['info', 'warning', 'error', 'success'],
            default: 'info',
          },
          {
            name: 'style',
            label: 'Style',
            widget: 'select',
            options: ['soft', 'outline', 'dash'],
            default: 'soft',
          },
          {
            name: 'direction',
            label: 'Direction',
            widget: 'select',
            options: ['horizontal', 'vertical', 'responsive'],
            default: 'horizontal',
          },
          {
            name: 'icon',
            label: 'Icon (Iconify)',
            widget: 'string',
            default: 'lucide:info',
            hint: 'Ví dụ: lucide:info, lucide:alert-triangle, lucide:circle-check',
          },
          {
            name: 'title',
            label: 'Title',
            widget: 'string',
          },
          {
            name: 'body',
            label: 'Content',
            widget: 'text',
          },
        ],
        pattern: /^<Alert([^>]*)>([\s\S]*?)<\/Alert>/m,
        fromBlock: (match) => {
          const attrs = match[1];
          const get = (key) => {
            const m = attrs.match(new RegExp(`${key}="([^"]*)"`));
            return m ? m[1] : '';
          };
          return {
            type: get('type'),
            style: get('style'),
            direction: get('direction'),
            icon: get('icon'),
            title: get('title'),
            body: match[2].trim(),
          };
        },
        toBlock: ({ type, style, direction, icon, title, body }) =>
          `<Alert type="${type}" style="${style}" direction="${direction}" icon="${icon}" title="${title}">\n${body}\n</Alert>`,
        toPreview: ({ type, title, body }) => {
          const colors = {
            info: '#3b82f6',
            warning: '#f59e0b',
            error: '#ef4444',
            success: '#22c55e',
          };
          return `<div style="border-left:4px solid ${colors[type] ?? '#3b82f6'};padding:12px 16px;margin:12px 0;background:#f8fafc;border-radius:4px">
            <strong style="display:block;margin-bottom:4px">${title}</strong>
            <span>${body}</span>
          </div>`;
        },
      });
    </script>
  </body>
</html>
